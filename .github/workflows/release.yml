name: Release & Deploy

# On every push to main:
#   1. Build the signed release APK.
#   2. Create a GitHub Release (tag v<versionName>) with the APK attached —
#      only when that tag does not already exist, so unrelated pushes are no-ops.
#   3. Deploy the web/ download page to Vercel production with the fresh APK.
#
# Required repository secret:
#   VERCEL_TOKEN  — a Vercel access token (Account Settings → Tokens).
# The Vercel org/project IDs below are not secrets (they identify, not authorize).
# Signing needs no secrets: iptvy-release.jks and its passwords live in the repo.

on:
  push:
    branches: [main]

permissions:
  contents: write   # needed to create tags and releases

concurrency:
  group: release-deploy
  cancel-in-progress: false

env:
  VERCEL_ORG_ID: team_Zz5TijIwy2xJGwSxjHfVLPtO
  VERCEL_PROJECT_ID: prj_xDm0KZTQIKGzuxpNiSULaHsppJNk

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag_exists: ${{ steps.meta.outputs.tag_exists }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need tags to decide whether this version was already released

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Build signed release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Read version and check tag
        id: meta
        run: |
          VERSION=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag_exists=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Version: $VERSION"

      - name: Stage APK artifact
        run: cp app/build/outputs/apk/release/app-release.apk "IPTVy-${{ steps.meta.outputs.version }}-release.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: IPTVy-${{ steps.meta.outputs.version }}-release.apk
          retention-days: 7

  release:
    needs: build
    if: needs.build.outputs.tag_exists == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.version }}
          name: IPTVy v${{ needs.build.outputs.version }}
          generate_release_notes: true
          files: IPTVy-${{ needs.build.outputs.version }}-release.apk

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: apk

      - name: Sync APK and version into web/
        run: |
          cp "IPTVy-${{ needs.build.outputs.version }}-release.apk" web/iptvy.apk
          sed -i -E "s|(Android TV &amp; Mobile · v)[0-9]+(\.[0-9]+)*|\1${{ needs.build.outputs.version }}|" web/index.html

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel production
        run: vercel deploy --prod --yes --cwd web --token "$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
