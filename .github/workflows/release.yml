name: Release

# On every push to main: build the signed release APK as a CI check, and — when
# versionName names a tag that does not yet exist — publish a GitHub Release with
# the APK attached. The release is the canonical home of the binary.
#
# Deployment of the download page (web/) is handled by Vercel's own Git
# integration, not this workflow. The page serves the APK from the latest GitHub
# Release (see web/vercel.json), so no APK is committed and nothing here touches
# Vercel. Signing needs no secrets: iptvy-release.jks and its passwords are in repo.

on:
  push:
    branches: [main]

permissions:
  contents: write   # needed to create tags and releases

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag_exists: ${{ steps.meta.outputs.tag_exists }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need tags to decide whether this version was already released

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Build signed release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Read version and check tag
        id: meta
        run: |
          VERSION=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag_exists=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Version: $VERSION"

      - name: Stage APK assets
        run: |
          SRC=app/build/outputs/apk/release/app-release.apk
          cp "$SRC" "IPTVy-${{ steps.meta.outputs.version }}-release.apk"
          cp "$SRC" iptvy.apk   # stable name so the website can link to releases/latest/download/iptvy.apk

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: |
            IPTVy-${{ steps.meta.outputs.version }}-release.apk
            iptvy.apk
          retention-days: 7

  release:
    needs: build
    if: needs.build.outputs.tag_exists == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Download APK artifacts
        uses: actions/download-artifact@v4
        with:
          name: apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.version }}
          name: IPTVy v${{ needs.build.outputs.version }}
          generate_release_notes: true
          files: |
            IPTVy-${{ needs.build.outputs.version }}-release.apk
            iptvy.apk
